name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload and commit to "pages" branch
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          git checkout -B pages
          git add -f dist
          git commit -m "Deploy to GitHub Pages"

          # Set up the remote URL with the token
          git remote add pages-remote https://$GITHUB_ACTOR:$GITHUB_TOKEN@github.com/TheBeeBoi/thebeeboi.github.io.git

          # Fetch and merge changes from the remote "pages" branch
          git pull pages-remote pages

          # Push to the "pages" branch
          git push pages-remote pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
